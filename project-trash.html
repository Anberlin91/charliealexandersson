<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Case Study – Charlie Alexandersson</title>
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>

  <!-- NAV -->
  <nav class="p-nav">
    <div class="p-container">
      <a href="index.html" class="p-nav-logo">Game UX Designer</a>
      <ul class="p-nav-links">
        <li><a href="index.html#work">Work</a></li>

      </ul>
    </div>
  </nav>

  <!-- HERO — populated by case.js -->
  <section class="case-hero">
    <div class="p-container">
      <a href="index.html#work" class="case-back">&larr; Back to all projects</a>
      <h1 id="cs-title"></h1>
      <p class="case-subtitle" id="cs-subtitle"></p>
      <div class="case-meta">
        <div class="case-meta-item">
          <span class="case-meta-label">Role</span>
          <span class="case-meta-value" id="cs-meta-role"></span>
        </div>
        <div class="case-meta-item">
          <span class="case-meta-label">Type</span>
          <span class="case-meta-value" id="cs-meta-type"></span>
        </div>
        <div class="case-meta-item">
          <span class="case-meta-label">Context</span>
          <span class="case-meta-value" id="cs-meta-context"></span>
        </div>
        <div class="case-meta-item">
          <span class="case-meta-label">Skills</span>
          <div class="tag-list" id="cs-meta-skills"></div>
        </div>
      </div>
      <div class="case-links" id="cs-links"></div>
      <img id="cs-cover" class="case-cover" src="" alt="" />

  </section>

  <!-- SECTIONS — built by case.js -->
  <div id="cs-sections"></div>

  <!-- PROJECT NAV — built by case.js -->
  <div class="p-container">
    <div class="case-nav" id="cs-nav"></div>
  </div>

  <!-- FOOTER -->
  <footer class="p-footer">
    <div class="p-container">
      <p>&copy; 2026 — Charlie Alexandersson</p>
      <ul class="p-footer-links">
        <li><a href="https://se.linkedin.com/in/charlie-alexandersson-ux-designer" target="_blank">LinkedIn</a></li>
        <li><a href="https://read.cv" target="_blank">Read.cv</a></li>
        <li><a href="mailto:charlie.alexandersson@hotmail.com">Email</a></li>
      </ul>
    </div>
  </footer>

  <button class="back-to-top" aria-label="Back to top">&uarr;</button>

  <script src="scripts/case.js"></script>
  <script>
    const backToTop = document.querySelector('.back-to-top');
    window.addEventListener('scroll', () => { backToTop.classList.toggle('visible', window.scrollY > 400); });
    backToTop.addEventListener('click', () => { window.scrollTo({ top: 0, behavior: 'smooth' }); });
  </script>
